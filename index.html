<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Business Organiser App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <h2>Business Organiser</h2>
      <nav>
        <a href="#dashboard">Dashboard</a>
        <a href="#clients">Clients</a>
        <a href="#jobs">Jobs</a>
      </nav>
    </aside>

    <main class="main-content">
      <section id="dashboard">
        <h1>Dashboard</h1>
        <div class="cards">
          <div class="card">
            <h3>Total Clients</h3>
            <p id="totalClients">0</p>
          </div>
          <div class="card">
            <h3>Total Jobs</h3>
            <p id="totalJobs">0</p>
          </div>
          <div class="card">
            <h3>Completed Jobs</h3>
            <p id="completedJobs">0</p>
          </div>
        </div>
      </section>

      <section id="clients">
        <div class="section-header">
          <h2>Clients</h2>
        </div>

        <form id="clientForm" class="form-card">
          <h3 id="clientFormTitle">Add Client</h3>
          <input type="text" id="clientName" placeholder="Client name" required />
          <input type="text" id="clientPhone" placeholder="Phone number" />
          <input type="text" id="clientAddress" placeholder="Address" />
          <textarea id="clientNotes" placeholder="Notes"></textarea>

          <div class="form-actions">
            <button type="submit" id="clientSubmitBtn">Add Client</button>
            <button type="button" id="cancelClientEditBtn" class="secondary-btn hidden">Cancel Edit</button>
          </div>
        </form>

        <div class="toolbar">
          <input
            type="text"
            id="clientSearch"
            placeholder="Search clients by name, phone, address or notes..."
          />
        </div>

        <div id="clientList" class="list"></div>
      </section>

      <section id="jobs">
        <div class="section-header">
          <h2>Jobs</h2>
        </div>

        <form id="jobForm" class="form-card">
          <h3 id="jobFormTitle">Add Job</h3>
          <select id="jobClient" required>
            <option value="">Select client</option>
          </select>
          <input type="text" id="jobService" placeholder="Service" required />
          <input type="date" id="jobDate" required />
          <input type="number" id="jobPrice" placeholder="Price" required min="0" step="0.01" />

          <div class="form-actions">
            <button type="submit" id="jobSubmitBtn">Add Job</button>
            <button type="button" id="cancelJobEditBtn" class="secondary-btn hidden">Cancel Edit</button>
          </div>
        </form>

        <div class="toolbar">
          <select id="jobFilter">
            <option value="all">All Jobs</option>
            <option value="upcoming">Upcoming</option>
            <option value="completed">Completed</option>
          </select>
        </div>

        <div id="jobList" class="list"></div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
